<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Course & Background Practice</title>
    <style>
        :root {
            --bg-color: #dcdde1; 
            --card-bg: #ffffff;
            --primary: #3498db;
            --secondary: #2ecc71;
            --text: #2f3640;
            --accent: #2c3e50;
            --model-bg: #f5f6fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 { 
            color: var(--accent); 
            font-size: 1.2rem; 
            text-align: center; 
            margin: 0 0 10px 0; 
        }

        .instruction { 
            color: #7f8c8d; 
            font-size: 0.85rem; 
            text-align: center; 
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .question-block { 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
            border-bottom: 1px solid #f1f2f6; 
        }

        .answer-display {
            min-height: 44px;
            padding: 8px;
            background: #f8f9fa;
            border: 2px dashed #dcdde1;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .word-bank { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin-bottom: 12px; 
        }

        .word {
            background: var(--primary);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            touch-action: manipulation;
            box-shadow: 0 2px 0 #2980b9;
            transition: transform 0.1s;
        }

        .word:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .word.used { 
            opacity: 0.15; 
            pointer-events: none; 
            box-shadow: none;
        }

        .answer-word { 
            background: var(--secondary); 
            color: white; 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer;
            font-size: 0.9rem;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .feedback { 
            font-weight: bold; 
            font-size: 0.85rem; 
        }

        .reset-btn { 
            background: #95a5a6; 
            color: white; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 0.75rem;
            font-weight: bold;
        }

        .check-btn {
            display: block; 
            width: 100%; 
            background: var(--accent); 
            color: white;
            border: none; 
            padding: 16px; 
            border-radius: 10px; 
            font-size: 1rem;
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold;
            -webkit-appearance: none;
        }

        #model-answers {
            display: none; 
            margin-top: 25px; 
            padding: 15px;
            background: var(--model-bg); 
            border-left: 4px solid var(--accent);
            border-radius: 8px;
        }

        .model-list { 
            padding-left: 20px; 
            font-size: 0.9rem; 
            line-height: 1.5;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Course & Background Practice</h1>
    <p class="instruction">Unscramble the words to make questions. Tap words to add/remove them.</p>
    
    <div id="quiz-container"></div>

    <button class="check-btn" onclick="checkAll()">Check & Show Model Answers</button>

    <div id="model-answers">
        <h3 style="margin-top:0; font-size: 1.1rem;">Model Answers:</h3>
        <ul class="model-list" id="model-list-display"></ul>
    </div>
</div>

<script>
    const data = [
        "How was your journey today?",
        "What in the course interests you?",
        "Could you tell us a bit more about your educational background?",
        "How did you find the course?",
        "Did you do a year abroad?",
        "Can you explain a bit about the modules your degree took during?",
        "Did you find the module challenging?"
    ];

    let studentAnswers = data.map(() => []);
    const container = document.getElementById('quiz-container');

    data.forEach((sentence, qIdx) => {
        let words = sentence.split(' ').filter(w => w.trim() !== "");
        let shuffled = [...words].sort(() => Math.random() - 0.5);

        const div = document.createElement('div');
        div.className = 'question-block';
        div.innerHTML = `
            <div class="answer-display" id="ans-${qIdx}"></div>
            <div class="word-bank" id="bank-${qIdx}">
                ${shuffled.map((w, wIdx) => {
                    const safeWord = w.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                    return `<div class="word" id="w-${qIdx}-${wIdx}" onclick="handleBankTap(${qIdx}, ${wIdx}, '${safeWord}')">${w}</div>`;
                }).join('')}
            </div>
            <div class="controls">
                <button class="reset-btn" onclick="resetQ(${qIdx})">Reset</button>
                <span id="fee-${qIdx}" class="feedback"></span>
            </div>
        `;
        container.appendChild(div);
    });

    function handleBankTap(qIdx, wIdx, word) {
        studentAnswers[qIdx].push({id: wIdx, text: word});
        document.getElementById(`w-${qIdx}-${wIdx}`).classList.add('used');
        render(qIdx);
    }

    function handleAnsTap(qIdx, aIdx) {
        const removed = studentAnswers[qIdx].splice(aIdx, 1)[0];
        document.getElementById(`w-${qIdx}-${removed.id}`).classList.remove('used');
        render(qIdx);
    }

    function render(qIdx) {
        const ad = document.getElementById(`ans-${qIdx}`);
        ad.innerHTML = '';
        studentAnswers[qIdx].forEach((obj, i) => {
            const span = document.createElement('span');
            span.className = 'answer-word';
            span.innerHTML = obj.text;
            span.onclick = () => handleAnsTap(qIdx, i);
            ad.appendChild(span);
        });
    }

    function resetQ(qIdx) {
        studentAnswers[qIdx] = [];
        document.querySelectorAll(`#bank-${qIdx} .word`).forEach(w => w.classList.remove('used'));
        document.getElementById(`fee-${qIdx}`).innerText = '';
        render(qIdx);
    }

    function checkAll() {
        data.forEach((correct, qIdx) => {
            const student = studentAnswers[qIdx].map(o => o.text).join(' ');
            const f = document.getElementById(`fee-${qIdx}`);
            
            const clean = (s) => s.replace(/[.\u2026?!,]/g, '').toLowerCase().trim().replace(/’/g, "'");
            
            if (clean(student) === clean(correct) && student !== "") {
                f.innerText = "✓ Correct"; 
                f.style.color = "#27ae60";
            } else {
                f.innerText = "✗ Not quite"; 
                f.style.color = "#e74c3c";
            }
        });

        const modelDiv = document.getElementById('model-answers');
        const list = document.getElementById('model-list-display');
        list.innerHTML = '';
        data.forEach(sentence => {
            let li = document.createElement('li');
            li.innerText = sentence;
            list.appendChild(li);
        });
        modelDiv.style.display = 'block';
        modelDiv.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
